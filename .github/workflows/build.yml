name: Release

on:
  push:
    branches: [release]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustSentinel
          path: target/release/trust-sentinel-daemon.exe